<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart BMI Analyzer Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 Top Navigation -->
<header class="top-bar">
  <div class="logo">
    <h2>🧍 BMI Analyzer <span>Pro</span></h2>
    <p class="subtitle">Smart Health Insights</p>
  </div>

  <button id="toggleMode" class="mode-btn">🌙</button>
</header>

<!-- 🚀 Main Container -->
<main class="container">

  <!-- 💎 Main Card -->
  <section class="card glass main-card">

    <!-- 📥 Input Section -->
    <div class="input-grid">
      <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70">
      </div>

      <div class="input-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 170">
      </div>
    </div>

    <!-- 🎯 Action Buttons -->
    <div class="action-buttons">
      <button id="calculateBtn" class="primary-btn">📊 Calculate</button>
      <button id="clearBtn" class="secondary-btn">🧹 Clear</button>
      <button id="downloadBtn" class="download-btn">📥 Download</button>
    </div>

    <!-- ⏳ Loader -->
    <div id="loader" class="loader hidden"></div>

    <!-- 📊 Result -->
    <div id="bmiResult" class="result-box hidden"></div>

    <!-- 📈 Meter -->
    <div class="meter hidden">
      <div id="meterFill"></div>
    </div>

    <!-- 📉 Chart -->
    <div class="chart-box hidden">
      <canvas id="bmiChart"></canvas>
    </div>

  </section>

  <!-- 🎯 Goal Section (Initially Hidden) -->
  <section id="goalSection" class="card glass goal-section hidden">
    <h3>Select Your Goal</h3>

    <div class="goal-buttons">
      <button id="gainBtn" class="goal gain">💪 Gain Weight</button>
      <button id="loseBtn" class="goal lose">🔥 Lose Weight</button>
    </div>
  </section>

  <!-- 📚 Tips Section -->
  <section id="tipsSection" class="card glass hidden">

    <h3>Personalized Tips</h3>

    <!-- Tabs -->
    <div id="categoryTabs" class="tabs">
      <button data-type="diet" class="tab active">🍗 Diet</button>
      <button data-type="workout" class="tab">🏋️ Workout</button>
      <button data-type="lifestyle" class="tab">😴 Lifestyle</button>
    </div>

    <!-- Tips Content -->
    <div id="tipsBox" class="tips-box">
      <p class="empty-state">Select a goal to see tips 👆</p>
    </div>

  </section>

  <!-- ⚡ AI Plans -->
  <section id="aiSection" class="card glass extra-section hidden">
    <h3>AI Plans</h3>

    <div class="extra-buttons">
      <button id="dietBtn" class="ai-btn">🍽 Generate Diet Plan</button>
      <button id="workoutBtn" class="ai-btn">🏋️ Generate Workout Plan</button>
    </div>
  </section>

</main>

<!-- 💡 Premium Modal -->
<div id="modal" class="modal">
  <div class="modal-content glass">

    <div class="modal-header">
      <h3 id="modalTitle">Smart Plan</h3>
      <span id="closeModal">&times;</span>
    </div>

    <!-- ⏳ Modal Loader -->
    <div id="modalLoader" class="loader hidden"></div>

    <div id="modalBody" class="modal-body"></div>

  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
