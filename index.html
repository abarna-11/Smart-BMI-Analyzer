<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart BMI Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tool-wrapper">
  <h2 class="tool-title">🧍 BMI Calculator</h2>

  <div class="converter-grid">
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <input type="number" id="age" placeholder="Age (optional)">

    <div class="gender-selector">
      <label><input type="radio" name="gender" value="male" checked> Male</label>
      <label><input type="radio" name="gender" value="female"> Female</label>
    </div>

    <button id="calculateBtn">📊 Get Result</button>
    <button id="clearBtn">🧹 Clear</button>
    <button id="downloadBtn">📥 Download</button>
  </div>

  <!-- RESULT -->
  <div id="bmiResult" class="output-box"></div>

  <!-- BMI METER -->
  <div class="meter">
    <div id="meterFill"></div>
  </div>

  <!-- GRAPH -->
  <canvas id="bmiChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
